name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Registry + scanners + ranking gate (dependency-free)
        run: make check

      - name: Install dev extras
        run: python -m pip install -e ".[dev]"

      - name: Full pytest suite
        run: python -m pytest -q

      - name: Lint (advisory; make check is the principal gate)
        continue-on-error: true
        run: ruff check motif scanners tools tests ii

  json-yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate JSON records parse
        run: |
          python - <<'PY'
          import json, pathlib, sys
          bad = 0
          for p in pathlib.Path("registry").rglob("*.json"):
              try:
                  json.loads(p.read_text())
              except Exception as e:
                  print(f"INVALID JSON: {p}: {e}"); bad += 1
          for p in pathlib.Path("schemas").glob("*.json"):
              json.loads(p.read_text())
          sys.exit(1 if bad else 0)
          PY
      - name: Validate YAML policies parse
        run: |
          python - <<'PY'
          import sys, pathlib
          sys.path.insert(0, ".")
          from motif import yaml_min
          for p in pathlib.Path("security").glob("*.yml"):
              yaml_min.load(p.read_text())
              print("ok", p)
          PY
